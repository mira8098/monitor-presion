<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#ef4444" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="description" content="Registra y monitorea tu presión arterial. Guarda mediciones, visualiza tendencias y comparte resultados." />
  <title>Monitor de Presión Arterial</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="images/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="images/icon-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="images/icon-512x512.png" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Serif+Display&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 50%, #e8ecf1 100%);
      min-height: 100vh;
      min-height: 100dvh;
      overflow-x: hidden;
    }
    #root { padding: 24px 16px; padding-bottom: 40px; }
    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type="number"] { -moz-appearance: textfield; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease-out; }
    @keyframes pulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    .heart-pulse { animation: pulse 1.2s ease-in-out infinite; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(100%); } to { opacity: 1; transform: translateY(0); } }
    .slide-up { animation: slideUp 0.3s ease-out; }
    @keyframes fadeOverlay { from { opacity: 0; } to { opacity: 1; } }
    .fade-overlay { animation: fadeOverlay 0.2s ease-out; }
    @media print {
      body { background: white !important; }
      .no-print { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const STORAGE_KEY = "bp_records";

    const categories = [
      { label: "Normal", sys: [0, 120], dia: [0, 80], color: "#22c55e", bg: "#f0fdf4", emoji: "✅" },
      { label: "Elevada", sys: [120, 130], dia: [0, 80], color: "#eab308", bg: "#fefce8", emoji: "⚠️" },
      { label: "Hipertensión 1", sys: [130, 140], dia: [80, 90], color: "#f97316", bg: "#fff7ed", emoji: "🔶" },
      { label: "Hipertensión 2", sys: [140, 180], dia: [90, 120], color: "#ef4444", bg: "#fef2f2", emoji: "🔴" },
      { label: "Crisis", sys: [180, 999], dia: [120, 999], color: "#991b1b", bg: "#fef2f2", emoji: "🚨" },
    ];

    function getCategory(sys, dia) {
      for (let i = categories.length - 1; i >= 0; i--) {
        if (sys >= categories[i].sys[0] || dia >= categories[i].dia[0]) return categories[i];
      }
      return categories[0];
    }

    function loadRecords() {
      try {
        const data = localStorage.getItem(STORAGE_KEY);
        if (data) return JSON.parse(data);
      } catch (e) {}
      return [{ sys: 122, dia: 84, pulse: 76, date: new Date().toISOString(), note: "Primera medición" }];
    }

    function saveRecords(records) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(records)); } catch (e) {}
    }

    function formatDate(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short", year: "numeric", hour: "2-digit", minute: "2-digit" });
    }

    function formatDateShort(iso) {
      const d = new Date(iso);
      return d.toLocaleDateString("es-ES", { day: "2-digit", month: "short" });
    }

    // ========== SHARE FUNCTIONS ==========

    function buildTextReport(records) {
      const latest = records[records.length - 1];
      const cat = latest ? getCategory(latest.sys, latest.dia) : categories[0];
      const avgSys = Math.round(records.reduce((a, r) => a + r.sys, 0) / records.length);
      const avgDia = Math.round(records.reduce((a, r) => a + r.dia, 0) / records.length);

      let text = `❤️ *REPORTE DE PRESIÓN ARTERIAL*\n`;
      text += `📅 ${formatDate(new Date().toISOString())}\n\n`;
      text += `📊 *Última medición:*\n`;
      text += `   Sistólica: ${latest.sys} mmHg\n`;
      text += `   Diastólica: ${latest.dia} mmHg\n`;
      if (latest.pulse) text += `   Pulso: ${latest.pulse} lpm\n`;
      text += `   Estado: ${cat.emoji} ${cat.label}\n\n`;
      text += `📈 *Promedios (${records.length} mediciones):*\n`;
      text += `   SYS: ${avgSys} mmHg | DIA: ${avgDia} mmHg\n\n`;
      text += `📋 *Últimas mediciones:*\n`;
      records.slice(-5).reverse().forEach(r => {
        const rc = getCategory(r.sys, r.dia);
        text += `   ${formatDateShort(r.date)} → ${r.sys}/${r.dia}`;
        if (r.pulse) text += ` 💓${r.pulse}`;
        text += ` ${rc.emoji}\n`;
      });
      text += `\n⚠️ Solo informativo. Consulte a su médico.`;
      return text;
    }

    function shareWhatsApp(records) {
      const text = buildTextReport(records);
      window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
    }

    function shareNative(records) {
      const text = buildTextReport(records);
      if (navigator.share) {
        navigator.share({ title: "Reporte de Presión Arterial", text }).catch(() => {});
      } else {
        try { navigator.clipboard.writeText(text); } catch(e) {
          const ta = document.createElement("textarea");
          ta.value = text; document.body.appendChild(ta);
          ta.select(); document.execCommand("copy");
          document.body.removeChild(ta);
        }
      }
    }

    function exportCSV(records) {
      const header = "Fecha,Sistólica,Diastólica,Pulso,Estado,Nota\n";
      const rows = records.map(r => {
        const rc = getCategory(r.sys, r.dia);
        return `"${formatDate(r.date)}",${r.sys},${r.dia},${r.pulse || ""},"${rc.label}","${r.note || ""}"`;
      }).join("\n");
      const blob = new Blob(["\uFEFF" + header + rows], { type: "text/csv;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "presion_arterial.csv"; a.click();
      URL.revokeObjectURL(url);
    }

    function downloadPrintableReport(records) {
      const latest = records[records.length - 1];
      const cat = latest ? getCategory(latest.sys, latest.dia) : categories[0];
      const avgSys = Math.round(records.reduce((a, r) => a + r.sys, 0) / records.length);
      const avgDia = Math.round(records.reduce((a, r) => a + r.dia, 0) / records.length);
      const avgPulse = records.filter(r => r.pulse).length
        ? Math.round(records.filter(r => r.pulse).reduce((a, r) => a + r.pulse, 0) / records.filter(r => r.pulse).length) : "—";

      const rows = [...records].reverse().map(r => {
        const rc = getCategory(r.sys, r.dia);
        return `<tr>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:13px">${formatDate(r.date)}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:700;text-align:center">${r.sys}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;font-weight:700;text-align:center">${r.dia}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:13px;text-align:center">${r.pulse || "—"}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:${rc.color};font-weight:600;text-align:center">${rc.emoji} ${rc.label}</td>
          <td style="padding:8px 12px;border-bottom:1px solid #e2e8f0;font-size:12px;color:#64748b">${r.note || ""}</td>
        </tr>`;
      }).join("");

      const html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Reporte Presión Arterial</title>
<style>@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'DM Sans',Arial,sans-serif;color:#1e293b;padding:32px;max-width:800px;margin:0 auto}
@media print{body{padding:16px}.no-print{display:none!important}}</style></head><body>
<div style="text-align:center;margin-bottom:28px">
<div style="font-size:40px;margin-bottom:8px">❤️</div>
<h1 style="font-size:24px;color:#0f172a;margin-bottom:4px">Reporte de Presión Arterial</h1>
<p style="color:#94a3b8;font-size:14px">Generado: ${formatDate(new Date().toISOString())}</p></div>
<div style="display:flex;gap:12px;margin-bottom:24px;flex-wrap:wrap">
<div style="flex:1;min-width:130px;background:#f8fafc;border-radius:12px;padding:16px;text-align:center;border:2px solid ${cat.color}22">
<div style="font-size:11px;color:#94a3b8;font-weight:600">ÚLTIMA LECTURA</div>
<div style="font-size:28px;font-weight:700;color:#0f172a;margin:4px 0">${latest.sys}/${latest.dia}</div>
<div style="font-size:13px;color:${cat.color};font-weight:600">${cat.emoji} ${cat.label}</div>
${latest.pulse ? `<div style="font-size:12px;color:#64748b;margin-top:4px">💓 ${latest.pulse} lpm</div>` : ""}</div>
<div style="flex:1;min-width:130px;background:#f8fafc;border-radius:12px;padding:16px;text-align:center">
<div style="font-size:11px;color:#94a3b8;font-weight:600">PROMEDIOS</div>
<div style="font-size:22px;font-weight:700;color:#0f172a;margin:4px 0">${avgSys}/${avgDia}</div>
<div style="font-size:12px;color:#64748b">💓 ${avgPulse} lpm</div></div>
<div style="flex:1;min-width:130px;background:#f8fafc;border-radius:12px;padding:16px;text-align:center">
<div style="font-size:11px;color:#94a3b8;font-weight:600">TOTAL</div>
<div style="font-size:28px;font-weight:700;color:#8b5cf6;margin:4px 0">${records.length}</div>
<div style="font-size:12px;color:#64748b">mediciones</div></div></div>
<h2 style="font-size:16px;color:#0f172a;margin-bottom:12px">📋 Historial Completo</h2>
<table style="width:100%;border-collapse:collapse;background:white;border-radius:12px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.06)">
<thead><tr style="background:#f1f5f9">
<th style="padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:700">Fecha</th>
<th style="padding:10px 12px;text-align:center;font-size:12px;color:#ef4444;font-weight:700">SYS</th>
<th style="padding:10px 12px;text-align:center;font-size:12px;color:#3b82f6;font-weight:700">DIA</th>
<th style="padding:10px 12px;text-align:center;font-size:12px;color:#8b5cf6;font-weight:700">Pulso</th>
<th style="padding:10px 12px;text-align:center;font-size:12px;color:#64748b;font-weight:700">Estado</th>
<th style="padding:10px 12px;text-align:left;font-size:12px;color:#64748b;font-weight:700">Nota</th>
</tr></thead><tbody>${rows}</tbody></table>
<div style="margin-top:20px;padding:14px;background:#fffbeb;border-radius:12px;border:1px solid #fde68a">
<p style="font-size:12px;color:#92400e;font-weight:600;margin-bottom:4px">📌 Clasificación</p>
<p style="font-size:11px;color:#78716c;line-height:1.8">✅ Normal: &lt;120/80 · ⚠️ Elevada: 120-129/&lt;80 · 🔶 HTA1: 130-139/80-89 · 🔴 HTA2: 140+/90+ · 🚨 Crisis: &gt;180/120</p></div>
<p style="text-align:center;font-size:11px;color:#cbd5e1;margin-top:20px">⚠️ Solo informativo. Consulte a su médico.</p>
<div class="no-print" style="text-align:center;margin-top:20px">
<button onclick="window.print()" style="padding:12px 24px;background:#3b82f6;color:white;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif">🖨️ Imprimir</button></div>
</body></html>`;

      const blob = new Blob([html], { type: "text/html" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a"); a.href = url; a.download = "reporte_presion.html"; a.click();
      URL.revokeObjectURL(url);
    }

    // ========== COMPONENTS ==========

    function GaugeArc({ value, min, max, label, unit, color }) {
      const pct = Math.min(Math.max((value - min) / (max - min), 0), 1);
      const angle = -90 + pct * 180;
      const r = 70, cx = 90, cy = 90;
      const x = cx + r * Math.cos((angle * Math.PI) / 180);
      const y = cy + r * Math.sin((angle * Math.PI) / 180);
      const id = `g-${label.replace(/\s/g, '')}`;
      return (
        <div style={{ textAlign: "center" }}>
          <svg width="160" height="105" viewBox="0 0 180 110">
            <defs>
              <linearGradient id={id} x1="0%" y1="0%" x2="100%" y2="0%">
                <stop offset="0%" stopColor="#22c55e" /><stop offset="40%" stopColor="#eab308" />
                <stop offset="70%" stopColor="#f97316" /><stop offset="100%" stopColor="#ef4444" />
              </linearGradient>
            </defs>
            <path d="M 20 90 A 70 70 0 0 1 160 90" fill="none" stroke="#e5e7eb" strokeWidth="12" strokeLinecap="round" />
            <path d="M 20 90 A 70 70 0 0 1 160 90" fill="none" stroke={`url(#${id})`} strokeWidth="12" strokeLinecap="round" opacity="0.3" />
            <circle cx={x} cy={y} r="8" fill={color} stroke="white" strokeWidth="3" style={{ filter: `drop-shadow(0 2px 4px ${color}66)` }} />
            <text x="90" y="75" textAnchor="middle" fontSize="28" fontWeight="700" fill="#1e293b" fontFamily="'DM Sans',sans-serif">{value}</text>
            <text x="90" y="95" textAnchor="middle" fontSize="11" fill="#94a3b8" fontFamily="'DM Sans',sans-serif">{unit}</text>
          </svg>
          <div style={{ fontSize: 12, color: "#64748b", marginTop: -6 }}>{label}</div>
        </div>
      );
    }

    function MiniChart({ records }) {
      if (records.length < 2) return <p style={{ textAlign: "center", color: "#94a3b8", fontSize: 13, padding: 20 }}>Necesitas al menos 2 registros</p>;
      const last = records.slice(-10);
      const allVals = last.flatMap(r => [r.sys, r.dia]);
      const maxVal = Math.max(...allVals, 150) + 10;
      const minVal = Math.min(...allVals, 50) - 10;
      const w = 320, h = 120, pad = 24;
      const toX = (i) => pad + (i / (last.length - 1)) * (w - pad * 2);
      const toY = (val) => pad + ((maxVal - val) / (maxVal - minVal)) * (h - pad * 2);
      const makePath = (key) => last.map((r, i) => `${i === 0 ? "M" : "L"} ${toX(i)} ${toY(r[key])}`).join(" ");
      return (
        <svg width="100%" viewBox={`0 0 ${w} ${h}`} style={{ marginTop: 8 }}>
          <line x1={pad} y1={toY(120)} x2={w-pad} y2={toY(120)} stroke="#22c55e" strokeWidth="1" strokeDasharray="4 4" opacity="0.4" />
          <line x1={pad} y1={toY(80)} x2={w-pad} y2={toY(80)} stroke="#3b82f6" strokeWidth="1" strokeDasharray="4 4" opacity="0.4" />
          <path d={makePath("sys")} fill="none" stroke="#ef4444" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          <path d={makePath("dia")} fill="none" stroke="#3b82f6" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round" />
          {last.map((r, i) => (
            <g key={i}>
              <circle cx={toX(i)} cy={toY(r.sys)} r="4" fill="#ef4444" stroke="white" strokeWidth="2" />
              <circle cx={toX(i)} cy={toY(r.dia)} r="4" fill="#3b82f6" stroke="white" strokeWidth="2" />
            </g>
          ))}
          <text x={w-pad+5} y={toY(120)+4} fontSize="9" fill="#22c55e">120</text>
          <text x={w-pad+5} y={toY(80)+4} fontSize="9" fill="#3b82f6">80</text>
        </svg>
      );
    }

    // ========== SHARE BOTTOM SHEET ==========

    function ShareSheet({ show, onClose, records, onToast }) {
      if (!show) return null;

      const btnBase = {
        display: "flex", alignItems: "center", gap: 12, width: "100%",
        padding: "14px 16px", borderRadius: 14, fontSize: 14, fontWeight: 600,
        cursor: "pointer", fontFamily: "'DM Sans', sans-serif", transition: "transform 0.1s",
        border: "none",
      };

      const handleAction = (fn, msg) => {
        fn(records);
        onToast(msg);
        onClose();
      };

      return (
        <div className="fade-overlay" onClick={onClose} style={{
          position: "fixed", top: 0, left: 0, right: 0, bottom: 0,
          background: "rgba(0,0,0,0.45)", backdropFilter: "blur(4px)",
          zIndex: 1000, display: "flex", alignItems: "flex-end", justifyContent: "center",
        }}>
          <div className="slide-up" onClick={e => e.stopPropagation()} style={{
            background: "white", borderRadius: "24px 24px 0 0", padding: "20px 20px 32px",
            width: "100%", maxWidth: 440,
          }}>
            {/* Handle */}
            <div style={{ width: 40, height: 4, borderRadius: 2, background: "#e2e8f0", margin: "0 auto 16px" }} />
            <h3 style={{ fontSize: 18, fontWeight: 700, color: "#0f172a", margin: "0 0 4px" }}>📤 Compartir Resultados</h3>
            <p style={{ fontSize: 13, color: "#94a3b8", margin: "0 0 20px" }}>Envía tu reporte a tu médico o familiar</p>

            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {/* WhatsApp */}
              <button onClick={() => handleAction(shareWhatsApp, "✅ Abriendo WhatsApp...")}
                style={{ ...btnBase, background: "#25D366", color: "white" }}>
                <span style={{ fontSize: 24, width: 36, textAlign: "center" }}>💬</span>
                <div style={{ textAlign: "left" }}>
                  <div>Enviar por WhatsApp</div>
                  <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.85 }}>Resumen completo con texto</div>
                </div>
              </button>

              {/* Download Report */}
              <button onClick={() => handleAction(downloadPrintableReport, "📄 Reporte descargado")}
                style={{ ...btnBase, background: "linear-gradient(135deg, #3b82f6, #2563eb)", color: "white" }}>
                <span style={{ fontSize: 24, width: 36, textAlign: "center" }}>📄</span>
                <div style={{ textAlign: "left" }}>
                  <div>Descargar Reporte</div>
                  <div style={{ fontSize: 11, fontWeight: 400, opacity: 0.85 }}>Para imprimir o enviar al médico</div>
                </div>
              </button>

              {/* CSV */}
              <button onClick={() => handleAction(exportCSV, "📊 CSV descargado")}
                style={{ ...btnBase, background: "white", color: "#475569", border: "2px solid #e2e8f0" }}>
                <span style={{ fontSize: 24, width: 36, textAlign: "center" }}>📊</span>
                <div style={{ textAlign: "left" }}>
                  <div>Exportar CSV (Excel)</div>
                  <div style={{ fontSize: 11, fontWeight: 400, color: "#94a3b8" }}>Tabla con todos los datos</div>
                </div>
              </button>

              {/* Native Share / Copy */}
              <button onClick={() => {
                shareNative(records);
                onToast(navigator.share ? "✅ Compartiendo..." : "✅ Copiado al portapapeles");
                onClose();
              }}
                style={{ ...btnBase, background: "white", color: "#475569", border: "2px solid #e2e8f0" }}>
                <span style={{ fontSize: 24, width: 36, textAlign: "center" }}>🔗</span>
                <div style={{ textAlign: "left" }}>
                  <div>{navigator.share ? "Compartir con otra app" : "Copiar al portapapeles"}</div>
                  <div style={{ fontSize: 11, fontWeight: 400, color: "#94a3b8" }}>
                    {navigator.share ? "Telegram, Email, SMS y más" : "Para pegar donde necesites"}
                  </div>
                </div>
              </button>
            </div>

            <button onClick={onClose} style={{
              ...btnBase, justifyContent: "center", background: "#f1f5f9", color: "#64748b", marginTop: 12,
            }}>Cancelar</button>
          </div>
        </div>
      );
    }

    // ========== MAIN APP ==========

    function App() {
      const [records, setRecords] = useState(loadRecords);
      const [sys, setSys] = useState("");
      const [dia, setDia] = useState("");
      const [pulse, setPulse] = useState("");
      const [note, setNote] = useState("");
      const [view, setView] = useState("input");
      const [toast, setToast] = useState("");
      const [showShare, setShowShare] = useState(false);

      useEffect(() => { saveRecords(records); }, [records]);

      const showToast = (msg) => { setToast(msg); setTimeout(() => setToast(""), 2500); };

      const latest = records[records.length - 1];
      const cat = latest ? getCategory(latest.sys, latest.dia) : categories[0];

      const addRecord = () => {
        const s = parseInt(sys), d = parseInt(dia), p = parseInt(pulse) || 0;
        if (!s || !d || s < 50 || s > 300 || d < 30 || d > 200) { showToast("⚠️ Valores inválidos"); return; }
        setRecords([...records, { sys: s, dia: d, pulse: p, date: new Date().toISOString(), note }]);
        setSys(""); setDia(""); setPulse(""); setNote("");
        showToast("✅ Medición guardada");
      };

      const deleteRecord = (i) => {
        if (records.length <= 1) { showToast("⚠️ Debe haber al menos 1 registro"); return; }
        setRecords(records.filter((_, idx) => idx !== i));
        showToast("🗑️ Eliminado");
      };

      const avgSys = records.length ? Math.round(records.reduce((a, r) => a + r.sys, 0) / records.length) : 0;
      const avgDia = records.length ? Math.round(records.reduce((a, r) => a + r.dia, 0) / records.length) : 0;
      const avgPulse = records.filter(r => r.pulse).length ? Math.round(records.filter(r => r.pulse).reduce((a, r) => a + r.pulse, 0) / records.filter(r => r.pulse).length) : 0;

      const inputStyle = {
        width: "100%", padding: "12px 16px", border: "2px solid #e2e8f0", borderRadius: 12,
        fontSize: 16, fontFamily: "'DM Sans', sans-serif", outline: "none",
        transition: "border-color 0.2s, box-shadow 0.2s", background: "white", boxSizing: "border-box",
      };
      const cardStyle = { background: "white", borderRadius: 20, padding: 24, boxShadow: "0 4px 24px rgba(0,0,0,0.04)" };

      return (
        <div style={{ maxWidth: 440, margin: "0 auto" }}>
          {/* Toast */}
          {toast && (
            <div className="fade-in" style={{
              position: "fixed", top: 20, left: "50%", transform: "translateX(-50%)",
              background: "#1e293b", color: "white", padding: "10px 20px", borderRadius: 12,
              fontSize: 14, fontWeight: 600, zIndex: 1100, boxShadow: "0 8px 32px rgba(0,0,0,0.2)",
            }}>{toast}</div>
          )}

          {/* Share Sheet */}
          <ShareSheet show={showShare} onClose={() => setShowShare(false)} records={records} onToast={showToast} />

          {/* Header */}
          <div style={{ textAlign: "center", marginBottom: 24 }}>
            <div className="heart-pulse" style={{
              display: "inline-flex", alignItems: "center", justifyContent: "center",
              width: 56, height: 56, borderRadius: 16,
              background: "linear-gradient(135deg, #ef4444, #f97316)",
              marginBottom: 10, boxShadow: "0 8px 24px rgba(239,68,68,0.3)",
            }}><span style={{ fontSize: 26 }}>❤️</span></div>
            <h1 style={{ fontFamily: "'DM Serif Display', serif", fontSize: 26, color: "#0f172a", margin: "0 0 4px" }}>Monitor de Presión</h1>
            <p style={{ color: "#94a3b8", fontSize: 13 }}>Registra y monitorea tu presión arterial</p>
          </div>

          {/* Tabs */}
          <div style={{ display: "flex", gap: 4, background: "#e2e8f0", borderRadius: 14, padding: 4, marginBottom: 20 }}>
            {[["input","➕ Nuevo"],["history","📋 Historial"],["stats","📊 Datos"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)} style={{
                flex: 1, padding: "10px 6px", border: "none", borderRadius: 11, fontSize: 13, fontWeight: 600,
                cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                background: view === v ? "white" : "transparent",
                color: view === v ? "#0f172a" : "#64748b",
                boxShadow: view === v ? "0 2px 8px rgba(0,0,0,0.06)" : "none", transition: "all 0.2s",
              }}>{label}</button>
            ))}
          </div>

          {/* ===== FLOATING SHARE BUTTON ===== */}
          <button className="no-print" onClick={() => setShowShare(true)} style={{
            position: "fixed", bottom: 24, right: 24, width: 58, height: 58,
            borderRadius: "50%", border: "none",
            background: "linear-gradient(135deg, #8b5cf6, #6d28d9)",
            color: "white", fontSize: 26, cursor: "pointer",
            boxShadow: "0 6px 24px rgba(109,40,217,0.45)",
            display: "flex", alignItems: "center", justifyContent: "center",
            zIndex: 100, transition: "transform 0.15s",
          }}
            onMouseDown={e => e.currentTarget.style.transform = "scale(0.88)"}
            onMouseUp={e => e.currentTarget.style.transform = "scale(1)"}
            onTouchStart={e => e.currentTarget.style.transform = "scale(0.88)"}
            onTouchEnd={e => e.currentTarget.style.transform = "scale(1)"}
          >📤</button>

          {/* ===== INPUT VIEW ===== */}
          {view === "input" && (
            <div className="fade-in">
              {latest && (
                <div style={{ ...cardStyle, marginBottom: 16, border: `2px solid ${cat.color}18` }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 12 }}>
                    <span style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", letterSpacing: "0.5px" }}>ÚLTIMA LECTURA</span>
                    <span style={{ padding: "4px 12px", borderRadius: 20, fontSize: 11, fontWeight: 700, background: cat.bg, color: cat.color, border: `1px solid ${cat.color}33` }}>{cat.emoji} {cat.label}</span>
                  </div>
                  <div style={{ display: "flex", justifyContent: "space-around" }}>
                    <GaugeArc value={latest.sys} min={70} max={200} label="Sistólica" unit="mmHg" color={cat.color} />
                    <GaugeArc value={latest.dia} min={40} max={130} label="Diastólica" unit="mmHg" color={cat.color} />
                  </div>
                  {latest.pulse > 0 && (
                    <div style={{ textAlign: "center", marginTop: 10, padding: "8px 16px", background: "#f8fafc", borderRadius: 12, display: "flex", alignItems: "center", justifyContent: "center", gap: 6 }}>
                      <span className="heart-pulse" style={{ fontSize: 16 }}>💓</span>
                      <span style={{ fontSize: 14, fontWeight: 600, color: "#475569" }}>{latest.pulse} lpm</span>
                    </div>
                  )}
                </div>
              )}

              <div style={cardStyle}>
                <h3 style={{ margin: "0 0 16px", fontSize: 16, color: "#0f172a", fontWeight: 700 }}>Nueva Medición</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 12 }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", marginBottom: 4, display: "block" }}>SYS (mmHg)</label>
                    <input type="number" inputMode="numeric" placeholder="120" value={sys} onChange={e => setSys(e.target.value)} style={inputStyle}
                      onFocus={e => { e.target.style.borderColor="#3b82f6"; e.target.style.boxShadow="0 0 0 3px rgba(59,130,246,0.1)"; }}
                      onBlur={e => { e.target.style.borderColor="#e2e8f0"; e.target.style.boxShadow="none"; }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", marginBottom: 4, display: "block" }}>DIA (mmHg)</label>
                    <input type="number" inputMode="numeric" placeholder="80" value={dia} onChange={e => setDia(e.target.value)} style={inputStyle}
                      onFocus={e => { e.target.style.borderColor="#3b82f6"; e.target.style.boxShadow="0 0 0 3px rgba(59,130,246,0.1)"; }}
                      onBlur={e => { e.target.style.borderColor="#e2e8f0"; e.target.style.boxShadow="none"; }} />
                  </div>
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 12, marginBottom: 16 }}>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", marginBottom: 4, display: "block" }}>PULSO (lpm)</label>
                    <input type="number" inputMode="numeric" placeholder="72" value={pulse} onChange={e => setPulse(e.target.value)} style={inputStyle}
                      onFocus={e => { e.target.style.borderColor="#3b82f6"; e.target.style.boxShadow="0 0 0 3px rgba(59,130,246,0.1)"; }}
                      onBlur={e => { e.target.style.borderColor="#e2e8f0"; e.target.style.boxShadow="none"; }} />
                  </div>
                  <div>
                    <label style={{ fontSize: 11, fontWeight: 700, color: "#94a3b8", marginBottom: 4, display: "block" }}>NOTA</label>
                    <input type="text" placeholder="Opcional..." value={note} onChange={e => setNote(e.target.value)} style={inputStyle}
                      onFocus={e => { e.target.style.borderColor="#3b82f6"; e.target.style.boxShadow="0 0 0 3px rgba(59,130,246,0.1)"; }}
                      onBlur={e => { e.target.style.borderColor="#e2e8f0"; e.target.style.boxShadow="none"; }} />
                  </div>
                </div>
                <button onClick={addRecord} style={{
                  width: "100%", padding: "14px", border: "none", borderRadius: 14,
                  background: "linear-gradient(135deg, #3b82f6, #2563eb)", color: "white",
                  fontSize: 15, fontWeight: 700, cursor: "pointer", fontFamily: "'DM Sans', sans-serif",
                  boxShadow: "0 4px 16px rgba(59,130,246,0.3)", transition: "transform 0.15s",
                }}
                  onMouseDown={e => e.target.style.transform = "scale(0.97)"}
                  onMouseUp={e => e.target.style.transform = "scale(1)"}
                  onTouchStart={e => e.target.style.transform = "scale(0.97)"}
                  onTouchEnd={e => e.target.style.transform = "scale(1)"}
                >💾 Guardar Medición</button>
              </div>

              <div style={{ ...cardStyle, marginTop: 16 }}>
                <p style={{ fontSize: 12, fontWeight: 700, color: "#94a3b8", margin: "0 0 10px", letterSpacing: "0.5px" }}>CLASIFICACIÓN</p>
                {categories.map((c, i) => (
                  <div key={i} style={{ display: "flex", alignItems: "center", gap: 8, padding: "8px 0", borderBottom: i < categories.length - 1 ? "1px solid #f1f5f9" : "none" }}>
                    <div style={{ width: 10, height: 10, borderRadius: "50%", background: c.color, flexShrink: 0 }} />
                    <span style={{ fontSize: 13, color: "#475569", flex: 1 }}>{c.label}</span>
                    <span style={{ fontSize: 11, color: "#94a3b8", fontWeight: 500 }}>{c.sys[0]}{c.sys[1]===999?"+":"-"+c.sys[1]} / {c.dia[0]}{c.dia[1]===999?"+":"-"+c.dia[1]}</span>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* ===== HISTORY VIEW ===== */}
          {view === "history" && (
            <div className="fade-in" style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {records.length === 0 && <div style={{ textAlign: "center", padding: 40, color: "#94a3b8" }}>Sin registros</div>}
              {[...records].reverse().map((r, i) => {
                const rc = getCategory(r.sys, r.dia);
                const realIdx = records.length - 1 - i;
                return (
                  <div key={i} style={{ background: "white", borderRadius: 16, padding: 16, boxShadow: "0 2px 12px rgba(0,0,0,0.04)", borderLeft: `4px solid ${rc.color}` }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "start" }}>
                      <div>
                        <div style={{ display: "flex", gap: 12, alignItems: "baseline" }}>
                          <span style={{ fontSize: 22, fontWeight: 700, color: "#0f172a" }}>{r.sys}/{r.dia}</span>
                          {r.pulse > 0 && <span style={{ fontSize: 13, color: "#64748b" }}>💓 {r.pulse}</span>}
                        </div>
                        <div style={{ fontSize: 12, color: "#94a3b8", marginTop: 3 }}>{formatDate(r.date)}</div>
                        {r.note && <div style={{ fontSize: 12, color: "#64748b", marginTop: 4, fontStyle: "italic" }}>📝 {r.note}</div>}
                      </div>
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ padding: "3px 10px", borderRadius: 12, fontSize: 10, fontWeight: 700, background: rc.bg, color: rc.color }}>{rc.label}</span>
                        <button onClick={() => deleteRecord(realIdx)} style={{ background: "none", border: "none", cursor: "pointer", fontSize: 18, color: "#cbd5e1", padding: 4 }}>✕</button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          )}

          {/* ===== STATS VIEW ===== */}
          {view === "stats" && (
            <div className="fade-in">
              <div style={cardStyle}>
                <h3 style={{ margin: "0 0 20px", fontSize: 16, color: "#0f172a", fontWeight: 700 }}>Estadísticas</h3>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr 1fr", gap: 10, marginBottom: 20 }}>
                  {[{ label: "Prom. SYS", val: avgSys, color: "#ef4444", unit: "mmHg" },
                    { label: "Prom. DIA", val: avgDia, color: "#3b82f6", unit: "mmHg" },
                    { label: "Prom. Pulso", val: avgPulse, color: "#8b5cf6", unit: "lpm" }
                  ].map((s, i) => (
                    <div key={i} style={{ textAlign: "center", padding: "14px 8px", background: "#f8fafc", borderRadius: 14 }}>
                      <div style={{ fontSize: 24, fontWeight: 700, color: s.color }}>{s.val}</div>
                      <div style={{ fontSize: 10, color: "#94a3b8", marginTop: 2 }}>{s.unit}</div>
                      <div style={{ fontSize: 11, color: "#64748b", marginTop: 4, fontWeight: 600 }}>{s.label}</div>
                    </div>
                  ))}
                </div>
                <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginBottom: 20 }}>
                  <div style={{ padding: 14, background: "#f8fafc", borderRadius: 14 }}>
                    <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600 }}>Máx SYS</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: "#ef4444" }}>{Math.max(...records.map(r => r.sys))}</div>
                  </div>
                  <div style={{ padding: 14, background: "#f8fafc", borderRadius: 14 }}>
                    <div style={{ fontSize: 11, color: "#94a3b8", fontWeight: 600 }}>Mín SYS</div>
                    <div style={{ fontSize: 20, fontWeight: 700, color: "#22c55e" }}>{Math.min(...records.map(r => r.sys))}</div>
                  </div>
                </div>
                <div>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <p style={{ fontSize: 13, fontWeight: 600, color: "#475569" }}>Tendencia</p>
                    <div style={{ display: "flex", gap: 10, fontSize: 11, color: "#94a3b8" }}><span>🔴 SYS</span> <span>🔵 DIA</span></div>
                  </div>
                  <MiniChart records={records} />
                </div>
              </div>

              <div style={{ ...cardStyle, marginTop: 16, background: "linear-gradient(135deg, #fffbeb, #fef3c7)", border: "1px solid #fde68a" }}>
                <p style={{ fontSize: 14, fontWeight: 700, color: "#92400e", margin: "0 0 10px" }}>💡 Consejos para medir bien</p>
                <div style={{ fontSize: 13, color: "#78716c", lineHeight: 1.8 }}>
                  <p style={{ margin: "0 0 4px" }}>• Mide siempre a la misma hora del día</p>
                  <p style={{ margin: "0 0 4px" }}>• Descansa 5 minutos antes de medir</p>
                  <p style={{ margin: "0 0 4px" }}>• Evita cafeína y ejercicio 30 min antes</p>
                  <p style={{ margin: "0 0 4px" }}>• Siéntate con la espalda apoyada</p>
                  <p style={{ margin: 0 }}>• Toma 2 lecturas y usa el promedio</p>
                </div>
              </div>

              <div style={{ ...cardStyle, marginTop: 16, textAlign: "center" }}>
                <span style={{ fontSize: 36, fontWeight: 700, color: "#0f172a" }}>{records.length}</span>
                <p style={{ fontSize: 13, color: "#94a3b8", margin: "4px 0 0" }}>mediciones registradas</p>
              </div>
            </div>
          )}

          <p style={{ textAlign: "center", fontSize: 11, color: "#cbd5e1", marginTop: 24, lineHeight: 1.6 }}>
            ⚠️ Solo informativo. Consulta a tu médico para diagnóstico.<br />Los datos se guardan localmente en tu dispositivo.
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function(){});
    }
  </script>
</body>
</html>
